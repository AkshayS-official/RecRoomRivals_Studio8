behaviors:
  ShooterBot:
    trainer_type: ppo

    hyperparameters:
      batch_size:   1024
      buffer_size:  40960
      learning_rate:          3.0e-4
      learning_rate_schedule: linear
      beta:    0.01        # slightly higher entropy = more exploration early
      epsilon: 0.2
      lambd:   0.95
      num_epoch: 3          # fewer epochs = faster updates with lots of agents

    network_settings:
      normalize:    true
      hidden_units: 256
      num_layers:   3

    reward_signals:
      extrinsic:
        gamma:    0.99
        strength: 1.0
      curiosity:
        gamma:         0.99
        strength:      0.05    # stronger curiosity = more position exploration
        encoding_size: 64
        learning_rate: 1.0e-3

    max_steps:          10000000   # 10M - enough for demo quality in ~15 min
    time_horizon:       64
    summary_freq:       2000       # update every 2k steps so you see progress fast
    checkpoint_interval: 200000
    keep_checkpoints:   5
